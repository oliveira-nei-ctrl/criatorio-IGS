<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFA500">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ovelhas">
<link rel="manifest" href="manifest.json">
<title>Criatório IGS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --primary:#FFA500;--primary-bg:#FFF7E6;--primary-text:#CC8400;
    --success:#CC8400;--success-bg:#FFF0CC;
    --danger:#C0392B;--danger-bg:#FDEDEC;
    --amber:#FFB84D;--amber-bg:#FFF3E0;
    --gray:#4B4B4D;--gray-bg:#F0F0F0;
    --text:#4B4B4D;--text2:#7A7A7C;--text3:#A0A0A2;
    --bg:#FFF7E6;--bg2:#FFFAF0;--bg3:#FFF5E0;
    --border:rgba(75,75,77,0.08);--border2:rgba(75,75,77,0.18);
    --radius:10px;--radius-lg:14px;
    --shadow:0 1px 3px rgba(75,75,77,0.06),0 1px 2px rgba(75,75,77,0.04);
    --shadow-md:0 4px 12px rgba(75,75,77,0.1);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media(prefers-color-scheme:dark){
    :root{ --text:#E8E6E3;--text2:#A8A6A3;--text3:#787673; --bg:#1A1816;--bg2:#2A2826;--bg3:#3A3836; --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12); --shadow:0 1px 3px rgba(0,0,0,0.3),0 1px 2px rgba(0,0,0,0.2); --shadow-md:0 4px 12px rgba(0,0,0,0.4); --primary:#FFA500;--primary-bg:#2A2418;--primary-text:#FFB84D; }
  }
  html.dark{ --text:#E8E6E3;--text2:#A8A6A3;--text3:#787673; --bg:#1A1816;--bg2:#2A2826;--bg3:#3A3836; --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12); --shadow:0 1px 3px rgba(0,0,0,0.3),0 1px 2px rgba(0,0,0,0.2); --shadow-md:0 4px 12px rgba(0,0,0,0.4); --primary:#FFA500;--primary-bg:#2A2418;--primary-text:#FFB84D; }
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
  .app{max-width:500px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;}

  /* TOPBAR */
  .topbar{padding:16px 18px 12px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;}
  .topbar-left .title{font-size:18px;font-weight:700;letter-spacing:-0.4px;background:linear-gradient(135deg,var(--primary),#FFB84D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .topbar-left .sub{font-size:12px;color:var(--text2);margin-top:1px;}
  .topbar-actions{display:flex;gap:6px;}
  .icon-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;color:var(--text2);}
  .icon-btn:hover{background:var(--bg3);transform:scale(1.05);}
  .icon-btn:active{transform:scale(0.92);}

  /* SCROLL AREA */
  .scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + var(--safe-bottom));}

  /* BOTTOM NAV */
  .bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:4px 0 calc(4px + var(--safe-bottom));z-index:20;}
  .bnav{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 4px 4px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:inherit;transition:all .2s;border-radius:8px;margin:0 2px;}
  .bnav.on{color:var(--primary);background:var(--primary-bg);}
  .bnav-ic{font-size:20px;line-height:1;}

  /* FAB */
  .fab{position:fixed;bottom:calc(84px + var(--safe-bottom));right:max(16px, calc(50% - 234px));width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--primary),#FFB84D);color:#fff;border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,165,0,0.35);z-index:15;transition:all .2s;}
  .fab:hover{transform:scale(1.06);box-shadow:0 6px 20px rgba(255,165,0,0.45);}
  .fab:active{transform:scale(0.92);}

  /* SECTIONS */
  .section{display:none;padding:16px 16px 0;}
  .section.on{display:block;}

  /* CARDS */
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);transition:box-shadow .2s;}
  .card-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;}

  /* METRICS */
  .metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
  .metric{background:var(--bg2);border-radius:var(--radius);padding:14px;border:1px solid var(--border);transition:transform .2s,box-shadow .2s;}
  .metric:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}
  .m-lbl{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;}
  .m-val{font-size:22px;font-weight:700;letter-spacing:-0.5px;line-height:1.2;}
  .m-sub{font-size:11px;color:var(--text3);margin-top:2px;}

  /* FORM */
  .form-g{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .form-g label{font-size:12px;font-weight:600;color:var(--text2);}
  .form-g input,.form-g select,.form-g textarea{
    padding:11px 13px;font-size:15px;border:1.5px solid var(--border2);
    border-radius:var(--radius);background:var(--bg2);color:var(--text);
    width:100%;-webkit-appearance:none;appearance:none;font-family:inherit;
    transition:border-color .2s,box-shadow .2s;
  }
  .form-g input:focus,.form-g select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,165,0,0.2);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  /* BUTTONS */
  .btn{padding:12px 18px;font-size:14px;font-weight:600;border-radius:var(--radius);cursor:pointer;width:100%;font-family:inherit;border:none;transition:all .2s;}
  .btn:active{transform:scale(0.97);}
  .btn-blue{background:linear-gradient(135deg,var(--primary),#FFB84D);color:#fff;box-shadow:0 2px 8px rgba(255,165,0,0.3);}
  .btn-blue:hover{box-shadow:0 4px 14px rgba(255,165,0,0.4);}
  .btn-red{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(192,57,43,0.2);}
  .btn-red:hover{background:#FADBD8;}
  .btn-green{background:var(--success-bg);color:var(--success);border:1px solid rgba(204,132,0,0.2);}
  .btn-green:hover{background:#FFE8B3;}
  .btn-outline{background:var(--bg2);color:var(--text);border:1px solid var(--border2);}
  .btn-outline:hover{background:var(--bg3);}
  .btn-sm{padding:6px 12px;font-size:12px;width:auto;border-radius:8px;}
  .btn svg{vertical-align:middle;margin-top:-2px;}
  .btn-row{display:flex;gap:8px;margin-top:6px;}

  /* BADGES */
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.2px;}
  .bg{background:var(--primary-bg);color:var(--primary-text);border:1px solid rgba(255,165,0,0.2);}
  .br{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(192,57,43,0.15);}
  .ba{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(217,119,6,0.15);}
  .bb{background:var(--primary-bg);color:var(--primary-text);border:1px solid rgba(37,99,235,0.15);}
  .bgr{background:var(--gray-bg);color:var(--gray);border:1px solid rgba(107,114,128,0.15);}

  /* ALERTS */
  .alert-r{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
  .alert-r:last-child{border-bottom:none;}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .dr{background:#EF4444;box-shadow:0 0 6px rgba(239,68,68,0.4);}
  .da{background:#F59E0B;box-shadow:0 0 6px rgba(245,158,11,0.4);}
  .dg{background:#CC8400;box-shadow:0 0 6px rgba(204,132,0,0.3);}

  /* CHART */
  .chart-bars{display:flex;align-items:flex-end;gap:4px;height:90px;margin-top:8px;padding:0 2px;}
  .bc{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
  .bar{width:100%;background:linear-gradient(to top,var(--primary),#FFB84D);border-radius:4px 4px 0 0;min-height:3px;transition:height .3s;}
  .bl{font-size:9px;color:var(--text3);}
  .bv{font-size:10px;font-weight:700;color:var(--text2);}

  /* TABS */
  .tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--bg2);border-radius:var(--radius);padding:4px;border:1px solid var(--border);}
  .tab{flex:1;padding:8px;font-size:12px;font-weight:600;border:none;background:none;border-radius:8px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .2s;}
  .tab.on{background:var(--bg);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.08);}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:30;display:none;align-items:flex-end;justify-content:center;}
  .overlay.on{display:flex;}
  .modal{background:var(--bg);border-radius:20px 20px 0 0;padding:22px 18px calc(28px + var(--safe-bottom));width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:slideUp .25s ease;}
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .modal-title{font-size:18px;font-weight:700;}
  .modal-close{width:32px;height:32px;border-radius:50%;background:var(--bg2);border:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:background .2s;}
  .modal-close:hover{background:var(--bg3);}
  .modal-close svg{width:18px;height:18px;}

  /* FINANCIAL */
  .pos{color:var(--success);font-weight:600;}
  .neg{color:var(--danger);font-weight:600;}

  /* EMPTY */
  .empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.6;}

  /* ANIMAL CARD */
  .animal-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);transition:box-shadow .2s;}
  .animal-card:hover{box-shadow:var(--shadow-md);}
  .ac-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .ac-id{font-size:17px;font-weight:700;}
  .ac-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;font-size:13px;}
  .ac-lbl{color:var(--text2);}
  .ac-val{font-weight:600;}

  /* SEARCH */
  .search-box{display:flex;gap:8px;margin-bottom:14px;}
  .search-box input{flex:1;padding:10px 14px;font-size:14px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-family:inherit;transition:border-color .2s,box-shadow .2s;}
  .search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,165,0,0.2);}

  /* GENEALOGY */
  .gene-node{display:flex;align-items:center;gap:8px;padding:8px 12px;margin:4px 0;background:var(--bg2);border-radius:var(--radius);font-size:13px;cursor:pointer;transition:all .2s;border:1px solid var(--border);}
  .gene-node:hover{background:var(--bg3);transform:translateX(4px);}
  .gene-tree{margin-left:28px;border-left:2px solid #FFB84D;padding-left:14px;}

  /* WEIGHT CHART */
  .weight-chart{display:flex;align-items:flex-end;gap:8px;height:100px;margin-top:10px;overflow-x:auto;padding-bottom:4px;}
  .wc{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:42px;}
  .wb{width:30px;background:linear-gradient(to top,var(--primary),#FFB84D);border-radius:4px 4px 0 0;min-height:3px;}
  .wl{font-size:8px;color:var(--text3);white-space:nowrap;}
  .wv{font-size:10px;font-weight:700;color:var(--text2);}

  /* SCROLLBAR */
  .scroll-area::-webkit-scrollbar{width:4px;}
  .scroll-area::-webkit-scrollbar-track{background:transparent;}
  .scroll-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

  /* INSTALL BANNER */
  .install-banner{background:var(--blue-bg);border:0.5px solid rgba(24,95,165,.3);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .ib-text{font-size:13px;color:var(--blue-text);}
  .ib-close{background:none;border:none;color:var(--blue-text);font-size:18px;cursor:pointer;padding:0;line-height:1;}

  /* EXPORT SECTION */
  .export-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="title">Criatório IGS</div>
      <div class="sub" id="topbar-date"></div>
    </div>
    <div class="topbar-actions">
      <div class="icon-btn" onclick="toggleDark()" title="Modo escuro" id="dark-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="dark-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></div>
      <div class="icon-btn" onclick="showConfigModal()" title="Configurações"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></div>
      <div class="icon-btn" onclick="showExportModal()" title="Exportar / Backup"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
    </div>
  </div>

  <div class="scroll-area" id="scroll-area">

    <!-- PAINEL -->
    <div id="s-painel" class="section on" style="padding-top:14px;">
      <div id="install-banner" class="install-banner" style="display:none;">
        <div class="ib-text">Instale o app na tela inicial para acesso rápido!</div>
        <button class="ib-close" onclick="dismissInstall()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="metrics" id="dash-metrics"></div>
      <div class="card">
        <div class="card-title">Nascimentos <span id="dash-ano" style="font-weight:400;text-transform:none;letter-spacing:0;"></span></div>
        <div class="chart-bars" id="birth-chart"></div>
      </div>
      <div class="card">
        <div class="card-title">Alertas</div>
        <div id="alerts-list"></div>
      </div>
      <div class="card">
        <div class="card-title">Financeiro</div>
        <div id="fin-resumo"></div>
      </div>
    </div>

    <!-- PLANTEL -->
    <div id="s-plantel" class="section">
      <div class="search-box">
        <input id="plantel-search" placeholder="Buscar por brinco, nome, raça..." oninput="renderPlantel()">
        <button class="icon-btn" onclick="showGenealogia()" title="Genealogia"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></button>
      </div>
      <div id="plantel-list"></div>
      <div class="empty" id="plantel-empty">Nenhum animal cadastrado.<br>Toque em + para adicionar.</div>
    </div>

    <!-- REPRODUÇÃO -->
    <div id="s-repro" class="section">
      <div class="tabs">
        <button class="tab on" onclick="setTab('repro','cobertura',this)">Coberturas</button>
        <button class="tab" onclick="setTab('repro','prenhez',this)">Prenhez</button>
        <button class="tab" onclick="setTab('repro','parto',this)">Partos</button>
      </div>
      <div id="repro-cobertura"></div>
      <div id="repro-prenhez" style="display:none;"></div>
      <div id="repro-parto" style="display:none;"></div>
    </div>

    <!-- SAÚDE -->
    <div id="s-saude" class="section">
      <div class="tabs">
        <button class="tab on" onclick="setTab('saude','vacina',this)">Vacinas</button>
        <button class="tab" onclick="setTab('saude','verminose',this)">Verminose</button>
        <button class="tab" onclick="setTab('saude','mortes',this)">Mortes</button>
      </div>
      <div id="saude-vacina"></div>
      <div id="saude-verminose" style="display:none;"></div>
      <div id="saude-mortes" style="display:none;"></div>
    </div>

    <!-- FINANCEIRO -->
    <div id="s-fin" class="section">
      <div class="search-box">
        <input type="date" id="fin-filtro-ini" onchange="renderFin()" style="flex:1;" title="Data início">
        <input type="date" id="fin-filtro-fim" onchange="renderFin()" style="flex:1;" title="Data fim">
        <button class="icon-btn" onclick="document.getElementById('fin-filtro-ini').value='';document.getElementById('fin-filtro-fim').value='';renderFin()" title="Limpar filtro"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div id="fin-list"></div>
      <div class="empty" id="fin-empty">Nenhum lançamento registrado.<br>Toque em + para adicionar.</div>
    </div>

  </div><!-- end scroll-area -->

  <!-- BOTTOM NAV -->
  <div class="bottomnav">
    <button class="bnav on" onclick="goSection('painel',this)"><span class="bnav-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>Painel</button>
    <button class="bnav" onclick="goSection('plantel',this)"><span class="bnav-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3a4 4 0 0 0-8 0v5a4 4 0 0 0 8 0V3z"/><path d="M4 16a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v1a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-1z"/><path d="M12 12v8"/></svg></span>Plantel</button>
    <button class="bnav" onclick="goSection('repro',this)"><span class="bnav-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/><path d="M12 8v4l3 3"/></svg></span>Reprodução</button>
    <button class="bnav" onclick="goSection('saude',this)"><span class="bnav-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span>Saúde</button>
    <button class="bnav" onclick="goSection('fin',this)"><span class="bnav-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>Finanças</button>
  </div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOuter(event)">
  <div class="modal" id="modal"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const D = {
  animais:[], nascimentos:[], mortes:[], vacinas:[],
  verminose:[], coberturas:[], prenheces:[], partos:[], financeiro:[],
  config:{ gestacao:147 }
};
let curSec='painel', curReproTab='cobertura', curSaudeTab='vacina';
let editIdx=null, editType=null;

function save(){ try{ localStorage.setItem('criadouro_v4', JSON.stringify(D)); }catch(e){} }
function load(){
  try{
    const raw = localStorage.getItem('criadouro_v4')||localStorage.getItem('criadouro_v3');
    if(raw){ const p=JSON.parse(raw); Object.keys(p).forEach(k=>{ if(D[k]!==undefined) D[k]=p[k]; }); }
    if(!D.config) D.config={ gestacao:147 };
  }catch(e){}
}

const td = () => new Date().toISOString().split('T')[0];
function fmtD(d){ if(!d) return '-'; const[y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
function fmtR(v){ return 'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function addDays(dateStr, days){
  const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}
function daysUntil(dateStr){
  const h=new Date(); h.setHours(0,0,0,0);
  return Math.ceil((new Date(dateStr+'T00:00:00')-h)/86400000);
}

function goSection(id, btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.bnav').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+id).classList.add('on');
  if(btn) btn.classList.add('on');
  curSec=id;
  document.getElementById('scroll-area').scrollTop=0;
  renderSection(id);
}

function setTab(sec, tab, btn){
  if(sec==='repro'){
    ['cobertura','prenhez','parto'].forEach(t=>{
      document.getElementById('repro-'+t).style.display=t===tab?'block':'none';
    });
    curReproTab=tab;
    renderRepro(tab);
  } else {
    ['vacina','verminose','mortes'].forEach(t=>{
      document.getElementById('saude-'+t).style.display=t===tab?'block':'none';
    });
    curSaudeTab=tab;
    renderSaude(tab);
  }
  btn.closest('.tabs').querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function showModal(html){
  document.getElementById('modal').innerHTML=html;
  document.getElementById('overlay').classList.add('on');
}
function closeModal(){ document.getElementById('overlay').classList.remove('on'); editIdx=null; editType=null; }
function closeOuter(e){ if(e.target===document.getElementById('overlay')) closeModal(); }

// ── CONFIG ──────────────────────────────────────────────
function showConfigModal(){
  showModal(`
<div class="modal-hd"><div class="modal-title">Configurações</div><button class="modal-close" onclick="closeModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
<div class="form-g"><label>Período de gestação padrão (dias)</label><input type="number" id="cfg-gest" value="${D.config.gestacao||147}" min="140" max="160"></div>
<div class="form-g"><label>Período médio entre vacinas (dias)</label><input type="number" id="cfg-vac" value="${D.config.intervaloVacina||180}" min="30" max="730"></div>
<button class="btn btn-blue" onclick="saveConfig()">Salvar configurações</button>
<div style="margin-top:16px;padding-top:16px;border-top:0.5px solid var(--border);">
  <div class="card-title">Backup dos dados</div>
  <div class="btn-row">
    <button class="btn btn-green" onclick="backupDados()">Baixar backup JSON</button>
    <button class="btn btn-outline" onclick="document.getElementById('restore-input').click()">Restaurar backup</button>
  </div>
  <input type="file" id="restore-input" accept=".json" style="display:none" onchange="restoreDados(event)">
</div>`);
}
function saveConfig(){
  D.config.gestacao=parseInt(document.getElementById('cfg-gest').value)||147;
  D.config.intervaloVacina=parseInt(document.getElementById('cfg-vac').value)||180;
  save(); closeModal(); renderAll();
}

function backupDados(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup_criadouro_'+td()+'.json';
  a.click();
}
function restoreDados(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const p=JSON.parse(ev.target.result);
      Object.keys(p).forEach(k=>{ if(D[k]!==undefined) D[k]=p[k]; });
      save(); closeModal(); renderAll();
      alert('Backup restaurado com sucesso!');
    }catch(err){ alert('Erro ao restaurar backup: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value='';
}

// ── FAB / ADD ──────────────────────────────────────────
function openAdd(){
  const map = {
    painel: ()=>fAnimal(null),
    plantel: ()=>fAnimal(null),
    repro: ()=>({cobertura:()=>fCobertura(null),prenhez:()=>fPrenhez(null),parto:()=>fParto(null)}[curReproTab])(),
    saude: ()=>({vacina:()=>fVacina(null),verminose:()=>fVerminose(null),mortes:()=>fMorte(null)}[curSaudeTab])(),
    fin: ()=>fFinanceiro(null)
  };
  const fn=map[curSec];
  if(fn) showModal(typeof fn==='function'?fn():fn);
}

function fAnimal(idx){

<div class="row2">
  <div class="form-g"><label>Brinco *</label><input id="fa-id" value="${a?a.id:''}" placeholder="OV-001" autocomplete="off"></div>

</div>
<div class="row2">
  <div class="form-g"><label>Sexo</label><select id="fa-sexo"><option ${a&&a.sexo==='Fêmea'?'selected':''}>Fêmea</option><option ${a&&a.sexo==='Macho'?'selected':''}>Macho</option></select></div>
  <div class="form-g"><label>Raça</label><input id="fa-raca" value="${a?a.raca||'':''}" placeholder="Santa Inês"></div>
</div>
<div class="row2">
  <div class="form-g"><label>Nascimento</label><input type="date" id="fa-nasc" value="${a?a.nasc||td():td()}"></div>
  <div class="form-g"><label>Peso (kg)</label><input type="number" step="0.1" id="fa-peso" value="${a?a.peso||'':''}" placeholder="0"></div>
</div>
<div class="row2">
  <div class="form-g"><label>ID Pai</label><input id="fa-pai" value="${a?a.pai||'':''}" placeholder="brinco"></div>

</div>
<div class="form-g"><label>Origem</label><select id="fa-ori"><option ${a&&a.origem==='Nascido aqui'?'selected':''}>Nascido aqui</option><option ${a&&a.origem==='Comprado'?'selected':''}>Comprado</option></select></div>
<button class="btn btn-blue" onclick="saveAnimal()">${a?'Atualizar':'Salvar'} animal</button>`; }

function saveAnimal(){
  const id=document.getElementById('fa-id').value.trim();
  if(!id){ alert('Informe o brinco.'); return; }
  if(editIdx===null){
    const dup=D.animais.findIndex(a=>a.id===id);
    if(dup>=0){ alert('Já existe um animal com este brinco: '+id); return; }
  }
  const obj={ id, nome:document.getElementById('fa-nome').value, sexo:document.getElementById('fa-sexo').value, raca:document.getElementById('fa-raca').value, nasc:document.getElementById('fa-nasc').value, peso:document.getElementById('fa-peso').value, pai:document.getElementById('fa-pai').value, mae:document.getElementById('fa-mae').value, origem:document.getElementById('fa-ori').value, status:'ativo', dt:td() };
  if(editIdx!==null){
    const old=D.animais[editIdx];
    obj.status=old.status;
    if(old.peso!==obj.peso&&obj.peso){
      if(!old.pesoHist) old.pesoHist=[];
      old.pesoHist.push({data:td(),peso:old.peso});
    }
    D.animais[editIdx]={...old,...obj};
  } else {
    D.animais.push(obj);
  }
  save(); closeModal(); renderSection(curSec); renderDashboard();
}

  const c=idx!==null?D.coberturas[idx]:null;

<button class="btn btn-blue" onclick="saveCobertura()">${c?'Atualizar':'Salvar'}</button>`; }

function saveCobertura(){
  const data=document.getElementById('fc-data').value;
  if(!data){ alert('Informe a data.'); return; }
  let prev=document.getElementById('fc-prev').value;
  if(!prev) prev=addDays(data,D.config.gestacao||147);
  if(editIdx!==null){
    D.coberturas[editIdx]={ data, femea:document.getElementById('fc-f').value, macho:document.getElementById('fc-m').value, tipo:document.getElementById('fc-tipo').value, prevParto:prev, obs:document.getElementById('fc-obs').value };
  } else {

  save(); closeModal(); renderRepro('cobertura'); renderDashboard();
}

  editIdx=idx; editType='mortes';
  return `

<div class="row2">
  <div class="form-g"><label>Data *</label><input type="date" id="fm-data" value="${m?m.data:td()}"></div>
  <div class="form-g"><label>Animal (brinco)</label><input id="fm-id" value="${m?m.id||'':''}" placeholder="OV-001"></div>
</div>
<div class="row2">
  <div class="form-g"><label>ID Pai</label><input id="fm-pai" value="${m?m.pai||'':''}" placeholder="brinco"></div>
  <div class="form-g"><label>ID Mãe</label><input id="fm-mae" value="${m?m.mae||'':''}" placeholder="brinco"></div>
</div>
<div class="form-g"><label>Causa</label>
  <select id="fm-causa">${['Desconhecida','Doença','Verminose','Parto','Predador','Acidente','Velhice'].map(t=>`<option ${m&&m.causa===t?'selected':''}>${t}</option>`).join('')}</select>
</div>
<div class="form-g"><label>Observações</label><input id="fm-obs" value="${m?m.obs||'':''}" placeholder="detalhes..."></div>
<button class="btn btn-red" onclick="saveMorte()">${m?'Atualizar':'Confirmar'} registro</button>`; }

function saveMorte(){
  const data=document.getElementById('fm-data').value;
  if(!data){ alert('Informe a data.'); return; }
  const id=document.getElementById('fm-id').value;
  if(editIdx===null){
    const a=D.animais.find(x=>x.id===id);
    if(a) a.status='morto';
  }
  const obj={ data, id, pai:document.getElementById('fm-pai').value, mae:document.getElementById('fm-mae').value, causa:document.getElementById('fm-causa').value, obs:document.getElementById('fm-obs').value };
  if(editIdx!==null) D.mortes[editIdx]=obj; else D.mortes.push(obj);
  save(); closeModal(); renderSaude('mortes'); renderDashboard(); renderSection('plantel');
}

</div>

</div>

function saveFinanceiro(){
  const data=document.getElementById('ff-data').value, val=parseFloat(document.getElementById('ff-val').value);
  if(!data||isNaN(val)){ alert('Informe data e valor.'); return; }
  const tipo=document.getElementById('ff-tipo').value;
  const obj={ data, tipo, desc:document.getElementById('ff-desc').value, valor:val, animal:document.getElementById('ff-an').value, qtd:document.getElementById('ff-qtd').value, parte:document.getElementById('ff-parte').value, obs:document.getElementById('ff-obs').value, entrada:['venda','outro_entrada'].includes(tipo) };
  if(editIdx!==null) D.financeiro[editIdx]=obj; else D.financeiro.push(obj);
  save(); closeModal(); renderFin(); renderDashboard();
}

// ── DELETE ─────────────────────────────────────────────
function del(arr,i,confirmMsg){
  if(confirmMsg&&!confirm(confirmMsg)) return;
  if(arr==='animais'&&D.animais[i]){
    D.animais[i].status='morto';
    D.mortes.push({ data:td(), id:D.animais[i].id, pai:'', mae:'', causa:'Removido', obs:'Removido do sistema' });
  }
  D[arr].splice(i,1);
  save(); renderAll();
}

// ── HELPERS ───────────────────────────────────────────
function famBadge(n){ const m={1:'bg',2:'bg',3:'ba',4:'br',5:'br'}; return `<span class="badge ${m[n]||'bgr'}">${n}</span>`; }
function vacStatus(prox){
  if(!prox) return '<span class="badge bgr">Sem retorno</span>';
  const d=daysUntil(prox);
  if(d<0) return '<span class="badge br">Atrasada</span>';
  if(d<=14) return `<span class="badge ba">${d}d</span>`;
  return '<span class="badge bg">Ok</span>';
}
function tipoBadge(t){ return ['venda','outro_entrada'].includes(t)?'<span class="badge bg">Entrada</span>':'<span class="badge br">Saída</span>'; }

// ── RENDER DASHBOARD ───────────────────────────────────
function renderDashboard(){
  const ativos=D.animais.filter(a=>a.status!=='morto').length;
  const totalMortos=D.mortes.length;
  const totalGeral=ativos+totalMortos;
  const taxaMorte=totalGeral>0?Math.round((totalMortos/totalGeral)*100):0;
  const totalNasc=D.nascimentos.reduce((s,n)=>s+n.qtd,0);
  const prenhezes=D.prenheces.filter(p=>p.resultado==='positivo').length;
  const entradas=D.financeiro.filter(f=>f.entrada).reduce((s,f)=>s+f.valor,0);
  const saidas=D.financeiro.filter(f=>!f.entrada).reduce((s,f)=>s+f.valor,0);
  const saldo=entradas-saidas;
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const vacAtras=D.vacinas.filter(v=>v.prox&&new Date(v.prox+'T00:00:00')<hoje).length;

  document.getElementById('dash-metrics').innerHTML=`
    <div class="metric"><div class="m-lbl">Animais ativos</div><div class="m-val">${ativos}</div></div>
    <div class="metric"><div class="m-lbl">Nascimentos</div><div class="m-val">${totalNasc}</div></div>
    <div class="metric"><div class="m-lbl">Prenhes</div><div class="m-val">${prenhezes}</div></div>
    <div class="metric"><div class="m-lbl">Vacinas atrasadas</div><div class="m-val" style="${vacAtras>0?'color:var(--red)':''}">${vacAtras}</div></div>
    <div class="metric"><div class="m-lbl">Mortes total</div><div class="m-val" style="${totalMortos>0?'color:var(--red)':''}">${totalMortos}</div><div class="m-sub">Taxa: ${taxaMorte}%</div></div>
    <div class="metric"><div class="m-lbl">Saldo</div><div class="m-val ${saldo>=0?'pos':'neg'}">${fmtR(saldo)}</div></div>`;

  const ano=hoje.getFullYear();
  document.getElementById('dash-ano').textContent=ano;
  const cnt=new Array(12).fill(0);
  D.nascimentos.forEach(n=>{ if(!n.data)return; const d=new Date(n.data+'T00:00:00'); if(d.getFullYear()===ano) cnt[d.getMonth()]+=n.qtd; });
  const max=Math.max(...cnt,1);
  const mes=['J','F','M','A','M','J','J','A','S','O','N','D'];
  document.getElementById('birth-chart').innerHTML=cnt.map((vv,i)=>`
    <div class="bc"><div class="bv">${vv||''}</div>
    <div class="bar" style="height:${Math.round((vv/max)*82)+3}px;${i===hoje.getMonth()?'background:var(--primary);opacity:1':'opacity:0.6'}"></div>
    <div class="bl">${mes[i]}</div></div>`).join('');

  const alerts=[];
  D.vacinas.forEach(v=>{ if(!v.prox)return; const d=daysUntil(v.prox); if(d<0) alerts.push({t:'r',msg:`Vacina ${v.nome||''} atrasada — ${v.animal||'-'}`}); else if(d<=7) alerts.push({t:'a',msg:`Vacina ${v.nome||''} vence em ${d}d`}); });
  D.prenheces.forEach(p=>{ if(!p.prevParto)return; const d=daysUntil(p.prevParto); if(d>=0&&d<=14) alerts.push({t:'a',msg:`Parto previsto em ${d}d — ${p.femea||'-'}`}); });
  D.coberturas.forEach(c=>{ if(!c.prevParto)return; const d=daysUntil(c.prevParto); if(d>=0&&d<=14) alerts.push({t:'a',msg:`Parto prev. em ${d}d — ${c.femea||'-'}`}); });
  D.verminose.forEach(v=>{ if(!v.prox)return; const d=daysUntil(v.prox); if(d<=0) alerts.push({t:'a',msg:`Avaliar verminose: ${v.animal||'-'}`}); });
  document.getElementById('alerts-list').innerHTML=alerts.length?alerts.slice(0,6).map(a=>`<div class="alert-r"><div class="dot d${a.t}"></div><span style="font-size:13px;">${a.msg}</span></div>`).join(''):'<div class="alert-r"><div class="dot dg"></div><span style="font-size:13px;color:var(--text2)">Sem alertas pendentes</span></div>';

  document.getElementById('fin-resumo').innerHTML=`
    <div style="display:flex;gap:20px;">
      <div><div style="font-size:11px;color:var(--text2)">Entradas</div><div class="pos" style="font-size:15px;">${fmtR(entradas)}</div></div>
      <div><div style="font-size:11px;color:var(--text2)">Saídas</div><div class="neg" style="font-size:15px;">${fmtR(saidas)}</div></div>
      <div><div style="font-size:11px;color:var(--text2)">Saldo</div><div class="${saldo>=0?'pos':'neg'}" style="font-size:15px;">${fmtR(saldo)}</div></div>
    </div>`;
}

// ── RENDER PLANTEL (with search & genealogy) ────────────
function renderPlantel(){
  const el=document.getElementById('plantel-list');
  const em=document.getElementById('plantel-empty');
  const q=document.getElementById('plantel-search').value.toLowerCase();
  let lista=D.animais;
  if(q) lista=lista.filter(a=> a.id.toLowerCase().includes(q)||a.nome?.toLowerCase().includes(q)||a.raca?.toLowerCase().includes(q));
  if(!lista.length){ el.innerHTML=''; em.style.display='block'; em.innerHTML=q?'Nenhum animal encontrado para "'+q+'".<br>Toque em + para adicionar.':'Nenhum animal cadastrado.<br>Toque em + para adicionar.'; return; }
  em.style.display='none';
  el.innerHTML=lista.map((a,i)=>{
    const realIdx=D.animais.indexOf(a);
    const filhos=D.animais.filter(f=>f.pai===a.id||f.mae===a.id);
    return `
    <div class="animal-card">
      <div class="ac-hd">
        <div><span class="ac-id">${a.id}</span>${a.nome?` — <span style="font-weight:400">${a.nome}</span>`:''}</div>
        <span class="badge ${a.status==='morto'?'br':'bg'}">${a.status==='morto'?'Morto':'Ativo'}</span>
      </div>
      <div class="ac-grid">
        <span class="ac-lbl">Sexo</span><span class="ac-val">${a.sexo}</span>
        <span class="ac-lbl">Raça</span><span class="ac-val">${a.raca||'-'}</span>
        <span class="ac-lbl">Nasc.</span><span class="ac-val">${fmtD(a.nasc)}</span>
        <span class="ac-val">${a.peso?a.peso+' kg':'-'}</span>
        <span class="ac-lbl">Pai</span><span class="ac-val">${a.pai||'-'}</span>
        <span class="ac-lbl">Mãe</span><span class="ac-val">${a.mae||'-'}</span>
        ${filhos.length?`<span class="ac-lbl">Filhos</span><span class="ac-val">${filhos.length}</span>`:''}
      </div>
      ${a.pesoHist&&a.pesoHist.length?`<div style="margin-top:8px;"><div class="weight-chart">${a.pesoHist.map((w,wi)=>`<div class="wc"><div class="wv">${w.peso}</div><div class="wb" style="height:${Math.round((parseFloat(w.peso)/Math.max(...a.pesoHist.map(x=>parseFloat(x.peso)),1))*85)+3}px"></div><div class="wl">${fmtD(w.data)}</div></div>`).join('')}${a.peso?`<div class="wc"><div class="wv">${a.peso}</div><div class="wb" style="height:${Math.round((parseFloat(a.peso)/Math.max(...a.pesoHist.map(x=>parseFloat(x.peso)),parseFloat(a.peso),1))*85)+3}px;background:var(--primary);"></div><div class="wl">atual</div></div>`:''}</div></div>`:''}
      <div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn btn-outline btn-sm" onclick="fAnimal(${realIdx});showModal(fAnimal(${realIdx}))">Editar</button>
        <button class="btn btn-outline btn-sm" onclick="registrarPeso(${realIdx})">Peso</button>
        <button class="btn btn-red btn-sm" onclick="del('animais',${realIdx},'Remover ${a.id} do plantel?')">Remover</button>
      </div>
    </div>`}).join('');
}

function registrarPeso(idx){
  const a=D.animais[idx];
  if(!a) return;
  const novo=prompt('Novo peso (kg) para '+a.id+':', a.peso||'');
  if(novo&&!isNaN(parseFloat(novo))){
    if(!a.pesoHist) a.pesoHist=[];
    if(a.peso) a.pesoHist.push({data:td(),peso:a.peso});
    a.peso=novo;
    save(); renderPlantel(); renderDashboard();
  }
}

// ── GENEALOGIA ─────────────────────────────────────────
function showGenealogia(animalId){
  const id=animalId||prompt('Digite o brinco do animal para ver a genealogia:');
  if(!id) return;
  const a=D.animais.find(x=>x.id===id);
  if(!a){ alert('Animal não encontrado: '+id); return; }

  function arvore(animal, depth=0){
    if(!animal||depth>5) return '';
    const pai=D.animais.find(x=>x.id===animal.pai);
    const mae=D.animais.find(x=>x.id===animal.mae);
    const filhos=D.animais.filter(f=>f.pai===animal.id||f.mae===animal.id);
    let html=`<div class="gene-node" onclick="showGenealogia('${animal.id}')">${'  '.repeat(depth)}${animal.id}${animal.nome?' ('+animal.nome+')':''} <span class="badge ${animal.status==='morto'?'br':'bg'}" style="font-size:9px;">${animal.status==='morto'?'Morto':'Ativo'}</span></div>`;
    if(pai||mae){
      html+='<div class="gene-tree">';
      if(pai) html+=arvore(pai,depth+1);
      if(mae) html+=arvore(mae,depth+1);
      html+='</div>';
    }
    if(filhos.length){
      html+=`<div style="margin-left:${24*(depth+1)}px;margin-top:4px;"><div style="font-size:11px;color:var(--text2);margin-bottom:4px;">Filhos:</div>`;
      filhos.forEach(f=>{ html+=`<div class="gene-node" style="font-size:12px;" onclick="showGenealogia('${f.id}')">${f.id}${f.nome?' ('+f.nome+')':''}</div>`; });
      html+='</div>';
    }
    return html;
  }

  showModal(`
<div class="modal-hd"><div class="modal-title">Genealogia — ${id}</div><button class="modal-close" onclick="closeModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
<div style="margin-bottom:12px;font-size:13px;color:var(--text2);">Toque em qualquer animal para navegar na árvore.</div>
<div style="overflow-x:auto;">${arvore(a)}</div>
<button class="btn btn-outline" style="margin-top:12px;" onclick="showGenealogia()">Buscar outro animal</button>`);
}

  const gest=D.config.gestacao||147;

    const el=document.getElementById('repro-cobertura');
    if(!D.coberturas.length){ el.innerHTML='<div class="empty">Nenhuma cobertura registrada.<br>Toque em + para adicionar.</div>'; return; }
    el.innerHTML=D.coberturas.map((c,i)=>`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-weight:600;">${fmtD(c.data)}</span><span class="badge bb">${c.tipo}</span>
        </div>
        <div style="font-size:13px;color:var(--text2);">Fêmea: <b style="color:var(--text)">${c.femea||'-'}</b> × Repr.: <b style="color:var(--text)">${c.macho||'-'}</b></div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px;">Parto previsto: <b style="color:var(--text)">${fmtD(c.prevParto)}</b> (${gest}dias)</div>

      </div>`).join('');
  } else if(tab==='prenhez'){
    const el=document.getElementById('repro-prenhez');
    if(!D.prenheces.length){ el.innerHTML='<div class="empty">Nenhum diagnóstico registrado.<br>Toque em + para adicionar.</div>'; return; }
    el.innerHTML=D.prenheces.map((p,i)=>`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">

        ${p.crias?`<div style="font-size:12px;color:var(--text2);margin-top:3px;">Crias previstas: <b style="color:var(--text)">${p.crias}</b></div>`:''}
        ${p.prevParto?`<div style="font-size:12px;color:var(--text2);margin-top:3px;">Parto previsto: <b style="color:var(--text)">${fmtD(p.prevParto)}</b></div>`:''}
        <div style="margin-top:10px;text-align:right;"><button class="btn btn-outline btn-sm" onclick="fPrenhez(${i});showModal(fPrenhez(${i}))">Editar</button> <button class="btn btn-outline btn-sm" onclick="del('prenheces',${i})">Remover</button></div>
      </div>`).join('');
  } else {
    const el=document.getElementById('repro-parto');
    if(!D.partos.length){ el.innerHTML='<div class="empty">Nenhum parto registrado.<br>Toque em + para adicionar.</div>'; return; }
    el.innerHTML=D.partos.map((p,i)=>`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-weight:600;">${fmtD(p.data)}</span><span class="badge ${p.tipo==='Normal'?'bg':'ba'}">${p.tipo}</span>
        </div>
        <div style="font-size:13px;color:var(--text2);">Mãe: <b style="color:var(--text)">${p.mae||'-'}</b> / Pai: <b style="color:var(--text)">${p.pai||'-'}</b></div>
        <div style="font-size:13px;color:var(--text2);margin-top:3px;"><b style="color:var(--text)">${p.qtd}</b> cria(s) — ${p.sexo}${p.peso?' — '+p.peso+'kg':''}</div>
        ${p.obs?`<div style="font-size:12px;color:var(--text3);margin-top:3px;">${p.obs}</div>`:''}

      </div>`).join('');
  }
}

// ── RENDER SAÚDE ───────────────────────────────────────
function renderSaude(tab){
  tab=tab||curSaudeTab;
  if(tab==='vacina'){
    const el=document.getElementById('saude-vacina');
    if(!D.vacinas.length){ el.innerHTML='<div class="empty">Nenhuma vacinação registrada.</div>'; return; }
    el.innerHTML=[...D.vacinas].sort((a,b)=>b.data.localeCompare(a.data)).map((v,i)=>`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-weight:600;">${v.nome||'Vacina'}</span>${vacStatus(v.prox)}
        </div>
        <div style="font-size:13px;color:var(--text2);">${fmtD(v.data)} — ${v.animal||'-'} — ${v.dose||'-'} ${v.via}</div>
        ${v.prox?`<div style="font-size:12px;color:var(--text2);margin-top:3px;">Próxima: <b style="color:var(--text)">${fmtD(v.prox)}</b></div>`:''}
        ${v.resp?`<div style="font-size:12px;color:var(--text3);margin-top:2px;">Resp.: ${v.resp}</div>`:''}
        <div style="margin-top:10px;text-align:right;"><button class="btn btn-outline btn-sm" onclick="fVacina(${i});showModal(fVacina(${i}))">Editar</button> <button class="btn btn-outline btn-sm" onclick="del('vacinas',${i})">Remover</button></div>
      </div>`).join('');
  } else if(tab==='verminose'){
    const el=document.getElementById('saude-verminose');
    if(!D.verminose.length){ el.innerHTML='<div class="empty">Nenhum tratamento registrado.</div>'; return; }
    el.innerHTML=[...D.verminose].sort((a,b)=>b.data.localeCompare(a.data)).map((v,i)=>`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-weight:600;">${v.animal||'-'}</span>${famBadge(parseInt(v.famacha))}
        </div>
        <div style="font-size:13px;color:var(--text2);">${fmtD(v.data)} — ${v.med||'-'} ${v.dose||''}${v.peso?' — '+v.peso+'kg':''}</div>
        ${v.prox?`<div style="font-size:12px;color:var(--text2);margin-top:3px;">Próx. aval.: <b style="color:var(--text)">${fmtD(v.prox)}</b></div>`:''}
        <div style="margin-top:10px;text-align:right;"><button class="btn btn-outline btn-sm" onclick="fVerminose(${i});showModal(fVerminose(${i}))">Editar</button> <button class="btn btn-outline btn-sm" onclick="del('verminose',${i})">Remover</button></div>
      </div>`).join('');
  } else {
    const el=document.getElementById('saude-mortes');
    if(!D.mortes.length){ el.innerHTML='<div class="empty">Nenhuma morte registrada.</div>'; return; }
    el.innerHTML=D.mortes.map((m,i)=>`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-weight:600;">${m.id||'-'}</span><span class="badge br">${m.causa}</span>
        </div>
        <div style="font-size:13px;color:var(--text2);">${fmtD(m.data)}</div>
        ${m.pai||m.mae?`<div style="font-size:12px;color:var(--text2);margin-top:3px;">Pai: ${m.pai||'-'} / Mãe: ${m.mae||'-'}</div>`:''}
        ${m.obs?`<div style="font-size:12px;color:var(--text3);margin-top:2px;">${m.obs}</div>`:''}
        <div style="margin-top:10px;text-align:right;"><button class="btn btn-outline btn-sm" onclick="fMorte(${i});showModal(fMorte(${i}))">Editar</button> <button class="btn btn-outline btn-sm" onclick="del('mortes',${i})">Remover</button></div>
      </div>`).join('');
  }
}

// ── RENDER FINANCEIRO (with date filter) ────────────────
function renderFin(){
  const el=document.getElementById('fin-list');
  const em=document.getElementById('fin-empty');
  const ini=document.getElementById('fin-filtro-ini').value;
  const fim=document.getElementById('fin-filtro-fim').value;
  let lista=D.financeiro;
  if(ini) lista=lista.filter(f=>f.data>=ini);
  if(fim) lista=lista.filter(f=>f.data<=fim);
  if(!lista.length){ el.innerHTML=''; em.style.display='block'; em.innerHTML=ini||fim?'Nenhum lançamento no período.':'Nenhum lançamento registrado.<br>Toque em + para adicionar.'; return; }
  em.style.display='none';
  const totalEnt=lista.filter(f=>f.entrada).reduce((s,f)=>s+f.valor,0);
  const totalSai=lista.filter(f=>!f.entrada).reduce((s,f)=>s+f.valor,0);
  el.innerHTML=`
    <div class="card" style="background:var(--bg2);">
      <div style="display:flex;gap:16px;font-size:13px;">
        <span>Entradas: <b class="pos">${fmtR(totalEnt)}</b></span>
        <span>Saídas: <b class="neg">${fmtR(totalSai)}</b></span>
        <span>Saldo: <b class="${(totalEnt-totalSai)>=0?'pos':'neg'}">${fmtR(totalEnt-totalSai)}</b></span>
      </div>
    </div>`+
  [...lista].sort((a,b)=>b.data.localeCompare(a.data)).map((f,i)=>{
    const realIdx=D.financeiro.indexOf(f);
    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
        <div>
          <div style="font-weight:600;font-size:14px;">${f.desc||f.tipo}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px;">${fmtD(f.data)}${f.parte?' — '+f.parte:''}</div>
          ${f.animal?`<div style="font-size:12px;color:var(--text2);">Animal: ${f.animal}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;">
          ${tipoBadge(f.tipo)}
          <div style="font-size:16px;font-weight:700;margin-top:4px;" class="${f.entrada?'pos':'neg'}">${f.entrada?'+':'-'}${fmtR(f.valor)}</div>
        </div>
      </div>
      <div style="margin-top:10px;text-align:right;"><button class="btn btn-outline btn-sm" onclick="fFinanceiro(${realIdx});showModal(fFinanceiro(${realIdx}))">Editar</button> <button class="btn btn-outline btn-sm" onclick="del('financeiro',${realIdx})">Remover</button></div>
    </div>`}).join('');
}

// ── RENDER ALL ─────────────────────────────────────────
function renderSection(id){
  if(id==='painel') renderDashboard();
  else if(id==='plantel') renderPlantel();
  else if(id==='repro'){ renderRepro('cobertura'); renderRepro('prenhez'); renderRepro('parto'); }
  else if(id==='saude'){ renderSaude('vacina'); renderSaude('verminose'); renderSaude('mortes'); }
  else if(id==='fin') renderFin();
}
function renderAll(){ renderDashboard(); renderPlantel(); ['cobertura','prenhez','parto'].forEach(t=>renderRepro(t)); ['vacina','verminose','mortes'].forEach(t=>renderSaude(t)); renderFin(); }

const HEADERS = {
  animais:    ['Brinco','Nome','Sexo','Raça','Nascimento','Peso(kg)','Pai','Mãe','Origem','Status'],
  nascimentos:['Data','Qtd','Mãe','Pai'],
  partos:     ['Data','Mãe','Pai','Qtd','Sexo','Tipo','Peso(kg)','Obs'],
  coberturas: ['Data','Fêmea','Reprodutor','Tipo','Parto Previsto','Obs'],
  prenheces:  ['Data','Fêmea','Resultado','Método','Crias','Parto Previsto','Obs'],
  vacinas:    ['Data','Animal','Vacina','Dose','Via','Próxima Dose','Responsável','Obs'],
  verminose:  ['Data','Animal','FAMACHA','Vermífugo','Dose','Peso(kg)','Próx. Avaliação'],
  mortes:     ['Data','Animal','Pai','Mãe','Causa','Obs'],
  financeiro: ['Data','Tipo','Descrição','Valor(R$)','Animal','Qtd/Peso','Parte','Obs','Entrada/Saída'],
};

function toRows(key){
  const rows=[HEADERS[key]];
  D[key].forEach(r=>{
    if(key==='animais')      rows.push([r.id,r.nome,r.sexo,r.raca,r.nasc,r.peso,r.pai,r.mae,r.origem,r.status]);
    else if(key==='nascimentos') rows.push([r.data,r.qtd,r.mae,r.pai]);
    else if(key==='partos')  rows.push([r.data,r.mae,r.pai,r.qtd,r.sexo,r.tipo,r.peso,r.obs]);
    else if(key==='coberturas') rows.push([r.data,r.femea,r.macho,r.tipo,r.prevParto,r.obs]);
    else if(key==='prenheces') rows.push([r.data,r.femea,r.resultado,r.metodo,r.crias,r.prevParto,r.obs]);
    else if(key==='vacinas') rows.push([r.data,r.animal,r.nome,r.dose,r.via,r.prox,r.resp,r.obs]);
    else if(key==='verminose') rows.push([r.data,r.animal,r.famacha,r.med,r.dose,r.peso,r.prox]);
    else if(key==='mortes')  rows.push([r.data,r.id,r.pai,r.mae,r.causa,r.obs]);
    else if(key==='financeiro') rows.push([r.data,r.tipo,r.desc,r.valor,r.animal,r.qtd,r.parte,r.obs,r.entrada?'Entrada':'Saída']);
  });
  return rows;
}

function exportSheet(key){
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(toRows(key));
  XLSX.utils.book_append_sheet(wb,ws,key);
  XLSX.writeFile(wb,`criadouro_${key}_${td()}.xlsx`);
}

function exportAll(){
  const wb=XLSX.utils.book_new();
  Object.keys(HEADERS).forEach(key=>{
    const ws=XLSX.utils.aoa_to_sheet(toRows(key));
    XLSX.utils.book_append_sheet(wb,ws,key);
  });
  XLSX.writeFile(wb,`criadouro_completo_${td()}.xlsx`);
}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt=e;
  const b=document.getElementById('install-banner');
  if(b) b.style.display='flex';
});
function dismissInstall(){
  document.getElementById('install-banner').style.display='none';
}
document.getElementById('install-banner') && document.getElementById('install-banner').addEventListener('click', async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  dismissInstall();
});

// ── DARK MODE ───────────────────────────────────────────
function toggleDark(){
  const h=document.documentElement;
  h.classList.toggle('dark');
  D.config.dark=h.classList.contains('dark');
  updateDarkIcon();
  save();
}
function applyDark(enable){
  const h=document.documentElement;
  if(enable) h.classList.add('dark'); else h.classList.remove('dark');
  updateDarkIcon();
}
function updateDarkIcon(){
  const el=document.getElementById('dark-icon');
  if(!el) return;
  const dark=document.documentElement.classList.contains('dark');
  el.innerHTML=dark
    ?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'

}
